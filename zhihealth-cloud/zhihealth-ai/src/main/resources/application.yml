server:
  port: 8087

spring:
  application:
    name: zhihealth-ai
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        import-check:
          enabled: false
  config:
    import: optional:nacos
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhihealth?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zhihealth.ai.entity
  configuration:
    map-underscore-to-camel-case: true

redis:
  host: localhost
  port: 6379
  password:
  database: 0
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 0

python-ai-service:
  url: http://localhost:5000
  timeout: 30

ollama:
  url: http://localhost:11434
  model: qwen2:7b
  timeout: 60

logging:
  level:
    com.zhihealth.ai: debug
