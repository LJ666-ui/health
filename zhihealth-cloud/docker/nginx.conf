# ============================================================
#  智康云枢 Nginx 生产配置（Docker部署版）
#  功能: 前端静态文件 + API反向代理 + WebSocket + 缓存
# ============================================================

# 后端网关集群（可扩展多节点）
upstream zhihealth_gateway {
    server gateway:8080 weight=10 max_fails=3 fail_timeout=30s;
    # server gateway2:8080 weight=5;  # 扩展节点
}

# Python AI服务
upstream zhihealth_python_ai {
    server python-ai:5000 max_fails=2 fail_timeout=15s;
}

server {
    listen 80;
    server_name _;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 访问日志
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ==================== 前端静态资源 ====================
    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # Vue Router history模式: 所有前端路由回退到index.html
        try_files $uri $uri/ /index.html;

        # 防止目录浏览
        autoindex off;
    }

    # ==================== API网关代理 ====================
    location /api/ {
        proxy_pass http://zhihealth_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;  # AI接口可能较慢

        # 请求体大小限制（文件上传）
        client_max_body_size 50m;

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 16 4k;
    }

    # ==================== Python AI服务代理 ====================
    location /ai-api/ {
        proxy_pass http://zhihealth_python_ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # AI推理可能很慢，给足超时
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;   # 大模型流式输出可能很长
        proxy_read_timeout 300s;

        # 禁用缓冲以支持SSE/流式响应
        proxy_buffering off;
        proxy_cache off;

        chunked_transfer_encoding on;
    }

    # ==================== WebSocket代理 ====================
    # 前端WebSocket预警推送
    location /ws/ {
        proxy_pass http://zhihealth_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket长连接超时
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ==================== Knife4j API文档（仅内网）====================
    location /doc.html {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://zhihealth_gateway;
    }

    # ==================== 静态资源长期缓存 ====================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        root   /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==================== 健康检查端点 ====================
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"zhihealth-frontend","timestamp":"$time_iso8601"}';
        default_type application/json;
    }

    # ==================== 错误页面 ====================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
