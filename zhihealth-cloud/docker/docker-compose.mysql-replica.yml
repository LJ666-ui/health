# 智康云枢 - MySQL主从复制配置
# 使用方式: docker-compose -f docker-compose.mysql-replica.yml up -d
# 主库端口3306, 从库端口3307

version: '3.8'

services:
  # ==================== MySQL主库 (Master) ====================
  mysql-master:
    image: mysql:8.0
    container_name: zhihealth-mysql-master
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - MYSQL_DATABASE=zhihealth
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
      - MYSQL_USER=zhihealth_app
      - MYSQL_PASSWORD=app_2024_secure
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --sync-binlog=1
      --innodb-flush-log-at-trx-commit=1
      --max_connections=500
      --innodb_buffer_pool_size=256M
      --read-only=0
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --log-slave-updates=ON
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./sql/master-init.sql:/docker-entrypoint-initdb.d/02_replication.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ==================== MySQL从库 (Slave) ====================
  mysql-slave:
    image: mysql:8.0
    container_name: zhihealth-mysql-slave
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --relay-log=relay-bin
      --read-only=1
      --super-read-only=0
      --max_connections=300
      --innodb_buffer_pool_size=128M
      --skip-slave-start=1
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --log-slave-updates=ON
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./sql/slave-init.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-master-data:
  mysql-slave-data:

networks:
  default:
    name: zhihealth-mysql-network
