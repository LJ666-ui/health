server:
  port: 8085

spring:
  application:
    name: zhihealth-cache
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
      config:
        server-addr: localhost:8848
        namespace: public
        file-extension: yml
        import-check:
          enabled: false
  redis:
    host: localhost
    port: 6379
    database: 4
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 10

influxdb:
  url: http://localhost:8086
  token: zhihealth_token_2024
  org: zhihealth
  bucket: health_data

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.zhihealth.cache: debug

cache:
  strategy:
    hot-data-ttl: 3600
    warm-data-ttl: 7200
    cold-data-ttl: 86400
  preheat:
    enabled: true
    cron: "0 0 * * * ?"
