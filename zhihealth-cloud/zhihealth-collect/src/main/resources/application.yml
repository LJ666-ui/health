server:
  port: 8083

spring:
  application:
    name: zhihealth-collect
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
      config:
        server-addr: localhost:8848
        namespace: public
        file-extension: yml
        import-check:
          enabled: false
  redis:
    host: localhost
    port: 6379
    database: 2
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.zhihealth.collect: debug

collect:
  validation:
    heart-rate:
      min: 30
      max: 220
    body-temp:
      min: 35.0
      max: 42.0
    blood-pressure-systolic:
      min: 60
      max: 200
    blood-pressure-diastolic:
      min: 40
      max: 130
    steps:
      min: 0
      max: 100000
    sleep-hours:
      min: 0
      max: 24
