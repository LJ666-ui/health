# ============================================================
#  智康云枢 - 生产环境Docker Compose配置
#  用途: 云服务器一键部署（优化资源限制）
# ============================================================

version: '3.8'

services:
  # ==================== 基础设施层 ====================
  
  mysql:
    image: mysql:8.0
    container_name: zhihealth-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-ZhiHealth_2024_Production}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --innodb_buffer_pool_size=1G
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhihealth-network

  redis:
    image: redis:7-alpine
    container_name: zhihealth-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-zhihealth_redis_2024} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhihealth-network

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: zhihealth-nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD:-ZhiHealth_2024_Production}
      JVM_XMS: 512m
      JVM_XMX: 1024m
      JVM_XMN: 256m
    volumes:
      - nacos_data:/home/nacos/logs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - zhihealth-network

  mongodb:
    image: mongo:6
    container_name: zhihealth-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    networks:
      - zhihealth-network

  influxdb:
    image: influxdb:2.7
    container_name: zhihealth-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-ZhiHealth_Influx_2024}
      DOCKER_INFLUXDB_INIT_ORG: zhihealth
      DOCKER_INFLUXDB_INIT_BUCKET: health_data
    volumes:
      - influxdb_data:/var/lib/influxdb2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - zhihealth-network

  # ==================== 微服务层 ====================
  
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: zhihealth-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      REDIS_HOST: redis
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 3
    networks:
      - zhihealth-network

  user-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.user
    container_name: zhihealth-user
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ZhiHealth_2024_Production}
      REDIS_HOST: redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    networks:
      - zhihealth-network

  device-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.device
    container_name: zhihealth-device
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ZhiHealth_2024_Production}
      REDIS_HOST: redis
    networks:
      - zhihealth-network

  collect-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.collect
    container_name: zhihealth-collect
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      INFLUXDB_HOST: influxdb
      REDIS_HOST: redis
    networks:
      - zhihealth-network

  storage-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.storage
    container_name: zhihealth-storage
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MONGODB_HOST: mongodb
      INFLUXDB_HOST: influxdb
      REDIS_HOST: redis
    networks:
      - zhihealth-network

  cache-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cache
    container_name: zhihealth-cache
    restart: always
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
    networks:
      - zhihealth-network

  alert-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.alert
    container_name: zhihealth-alert
    restart: always
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    networks:
      - zhihealth-network

  log-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.log
    container_name: zhihealth-log
    restart: always
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MONGODB_HOST: mongodb
    networks:
      - zhihealth-network

  report-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.report
    container_name: zhihealth-report
    restart: always
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    networks:
      - zhihealth-network

  ai-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    container_name: zhihealth-ai
    restart: always
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    networks:
      - zhihealth-network

  # ==================== 前端Nginx ====================
  
  nginx:
    image: nginx:alpine
    container_name: zhihealth-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../zhihealth-frontend/dist:/usr/share/nginx/html
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - gateway
    networks:
      - zhihealth-network

# ==================== 网络配置 ====================
networks:
  zhihealth-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nacos_data:
    driver: local
  mongodb_data:
    driver: local
  influxdb_data:
    driver: local
