# ============================================================
#  智康云枢 - 从节点(Slave) Docker Compose
#  适配: 2核4G服务器 (大数据存储专用)
#  用途: InfluxDB + MongoDB + Hive(可选)
# ============================================================

version: '3.8'

services:
  # ==================== 时序数据库 ====================
  
  influxdb:
    image: influxdb:2.7-alpine
    container_name: zhihealth-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-admin123456}
      DOCKER_INFLUXDB_INIT_ORG: zhihealth
      DOCKER_INFLUXDB_INIT_BUCKET: health_data
      DOCKER_INFLUXDB_INIT_RETENTION: 30d  # 数据保留30天
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    command: >
      influxd
      --storage-cache-max-memory-size=256m
      --storage-cache-snapshot-memory-size=128m
      --query-concurrent-queries=10
    deploy:
      resources:
        limits:
          memory: 512M         # InfluxDB限制512MB
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - zhihealth-network

  # ==================== 文档数据库 ====================
  
  mongodb:
    image: mongo:6
    container_name: zhihealth-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo123456}
      MONGO_INITDB_DATABASE: zhihealth_storage
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./config/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: >
      mongod
      --wiredTigerCacheSizeGB 0.5     # 限制MongoDB缓存512MB
      --maxConns 200                   # 最大连接数
    deploy:
      resources:
        limits:
          memory: 768M         # MongoDB限制768MB
          cpus: '1.0'
    networks:
      - zhihealth-network

  # ==================== 可选：Hive大数据栈（资源紧张时注释掉）====================
  
  # hive-metastore:
  #   image: bde2020/hive:3.1.2-postgresql-metastore
  #   container_name: zhihealth-hive-metastore
  #   restart: always
  #   env_file:
  #     - .env.hive
  #   depends_on:
  #     - namenode
  #     - datanode
  #     - hive-mysql
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1024M
  #         cpus: '1.5'
  #   networks:
  #     - zhihealth-network

# ==================== 网络配置 ====================
networks:
  zhihealth-network:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
