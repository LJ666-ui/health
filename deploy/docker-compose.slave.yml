# ============================================================
#  智康云枢 - 从节点(Slave) Docker Compose
#  适配: 2核8G服务器（微服务集群 + 数据存储）
#  用途: 9个业务微服务 + InfluxDB + MongoDB + 前端Nginx
#
#  注意：MySQL/Redis/Nacos/RabbitMQ 在主节点(182.92.1.136)
#        本节点通过内网访问主节点基础设施
# ============================================================

# version字段已移除，兼容旧版docker-compose

services:
  # ==================== 本地数据存储 ====================

  influxdb:
    image: influxdb:2.7-alpine
    container_name: zhihealth-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-admin123456}
      DOCKER_INFLUXDB_INIT_ORG: zhihealth
      DOCKER_INFLUXDB_INIT_BUCKET: health_data
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
    volumes:
      - influxdb_data:/var/lib/influxdb2
    command: >
      influxd
      --storage-cache-max-memory-size=256m
      --query-concurrent-queries=10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.8'
    networks:
      - zhihealth-network

  mongodb:
    image: mongo:6
    container_name: zhihealth-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo123456}
      MONGO_INITDB_DATABASE: zhihealth_storage
    volumes:
      - mongodb_data:/data/db
      - ./config/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: >
      mongod
      --wiredTigerCacheSizeGB 0.5
      --maxConns 200
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.8'
    networks:
      - zhihealth-network

  # ==================== 业务微服务集群 ====================
  # 所有微服务连接主节点的 MySQL/Redis/Nacos

  user-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.user
    container_name: zhihealth-user
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${MASTER_IP:-182.92.1.136}:8848
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root_2024_zhihealth}
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 350M
          cpus: '0.5'
    networks:
      - zhihealth-network

  device-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.device
    container_name: zhihealth-device
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${MASTER_IP:-182.92.1.136}:8848
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root_2024_zhihealth}
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms96m -Xmx192m"
    deploy:
      resources:
        limits:
          memory: 280M
          cpus: '0.3'
    networks:
      - zhihealth-network

  collect-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.collect
    container_name: zhihealth-collect
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${MASTER_IP:-182.92.1.136}:8848
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      INFLUXDB_HOST: influxdb       # 本地InfluxDB
      INFLUXDB_PORT: 8086
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms96m -Xmx192m"
    deploy:
      resources:
        limits:
          memory: 280M
          cpus: '0.3'
    depends_on:
      - influxdb
    networks:
      - zhihealth-network

  storage-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.storage
    container_name: zhihealth-storage
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${MASTER_IP:-182.92.1.136}:8848
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      MONGODB_HOST: mongodb         # 本地MongoDB
      MONGODB_PORT: 27017
      INFLUXDB_HOST: influxdb       # 本地InfluxDB
      INFLUXDB_PORT: 8086
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 380M
          cpus: '0.5'
    depends_on:
      - mongodb
      - influxdb
    networks:
      - zhihealth-network

  cache-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.cache
    container_name: zhihealth-cache
    restart: always
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms64m -Xmx128m"
    deploy:
      resources:
        limits:
          memory: 180M
          cpus: '0.2'
    networks:
      - zhihealth-network

  alert-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.alert
    container_name: zhihealth-alert
    restart: always
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${MASTER_IP:-182.92.1.136}:8848
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      RABBITMQ_HOST: ${MASTER_IP:-182.92.1.136}
      RABBITMQ_PORT: 5672
      JAVA_OPTS: "-Xms96m -Xmx192m"
    deploy:
      resources:
        limits:
          memory: 280M
          cpus: '0.3'
    networks:
      - zhihealth-network

  report-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.report
    container_name: zhihealth-report
    restart: always
    ports:
      - "8091:8091"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root_2024_zhihealth}
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms128m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 350M
          cpus: '0.5'
    networks:
      - zhihealth-network

  log-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.log
    container_name: zhihealth-log
    restart: always
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      MYSQL_PORT: 3306
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      JAVA_OPTS: "-Xms64m -Xmx128m"
    deploy:
      resources:
        limits:
          memory: 180M
          cpus: '0.2'
    depends_on:
      - mongodb
    networks:
      - zhihealth-network

  ai-service:
    build:
      context: ../zhihealth-cloud
      dockerfile: docker/Dockerfile.ai
    container_name: zhihealth-ai
    restart: always
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: ${MASTER_IP:-182.92.1.136}:8848
      MYSQL_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_HOST: ${MASTER_IP:-182.92.1.136}
      REDIS_PORT: 6379
      JAVA_OPTS: "-Xms192m -Xmx512m"
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: '1.0'
    networks:
      - zhihealth-network

  # ==================== 前端Nginx ====================

  nginx:
    image: nginx:alpine
    container_name: zhihealth-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../zhihealth-frontend/dist:/usr/share/nginx/html:ro
      - ./config/nginx.slave.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 50M
          cpus: '0.1'
    networks:
      - zhihealth-network

# ==================== 网络配置 ====================
networks:
  zhihealth-network:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  influxdb_data:
    driver: local
  mongodb_data:
    driver: local
