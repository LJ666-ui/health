[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=etl
    --cov=ai
    --cov=api
    --cov=alerting
    --cov=scheduler
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -p no:warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as requiring external services
    unit: marks tests as pure logic unit tests

[coverage:run]
source = .
omit = 
    tests/*
    venv/*
    __pycache__/*
    *.pyc
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod