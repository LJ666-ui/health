apiVersion: 1

datasources:
  - name: MySQL
    type: mysql
    access: proxy
    url: mysql:3306
    database: zhihealth
    user: zhihealth
    password: ZhiHealth123
    jsonData:
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
    isDefault: true
    editable: false

  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: health_data
    user: admin
    password: ZhiHealthInflux2026
    jsonData:
      httpMode: POST
      version: Flux
    editable: false

  - name: MongoDB
    type: grafana-mongodb-datasource
    access: proxy
    url: mongodb://admin:ZhiHealthMongo2026@mongodb:27017/zhihealth?authSource=admin
    database: zhihealth
    editable: false

  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis:6379
    password: ""
    jsonData:
      poolSize: 10
      timeout: 10
    editable: false

  - name: Prometheus (Optional)
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false